<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
</head>

<body>
    <!-- Shared emotion input UI.
     The slider outputs one project-wide emotionValue:
     -1 = unpleasant, 0 = neutral, 1 = pleasant. -->
<div id="emotion-ui">
    <div id="emotion-title">Current Feeling</div>
    <div id="emotion-label">Neutral</div>

    <!-- This range input is read in sketch.js and mapped into emotionValue. -->
    <input
        id="emotion-slider"
        type="range"
        min="-1"
        max="1"
        step="0.01"
        value="0"
    >

    <div id="emotion-scale">
        <span>Unpleasant</span>
        <span>Pleasant</span>
    </div>
</div>

    <script src="perlin-random-Yidan.js"></script>
    <script src="MainSphere_Hantao.js"></script>
    <script src="Interaction_Hantao.js"></script>
    <script src="Audio Driven-YingHu.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
